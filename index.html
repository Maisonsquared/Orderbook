<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Order Book — Furniture Orders & Payments</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-firestore-compat.min.js"></script>
<style>
  :root{
    --bg:#EFEDE6; --panel:#FFFFFF; --ink:#22271F; --ink-soft:#5C6156;
    --line:#DAD6CB; --wood:#8A5A2B; --wood-light:#C89B62; --brass:#A97E2F;
    --green:#4C7A4C; --red:#A5453B; --chip:#F4F2EC;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; min-height:100vh;}
  .serif{font-family:Georgia,'Times New Roman',serif;}
  header{border-bottom:1px solid var(--line); padding:16px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;}
  header h1{font-size:20px; font-family:Georgia,serif; font-weight:600;}
  header .sub{font-size:12px; color:var(--ink-soft);}
  nav{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  main{max-width:1080px; margin:0 auto; padding:20px;}
  .btn{border:1px solid var(--line); background:transparent; color:var(--ink); padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit;}
  .btn:hover{opacity:.8;}
  .btn.solid{background:var(--ink); color:#fff; border-color:var(--ink);}
  .btn.danger{color:var(--red); border-color:var(--red);}
  .btn.small{padding:5px 12px; font-size:13px;}
  .btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px;}
  .grid{display:grid; gap:14px;}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
  .kpi .label{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);}
  .kpi .value{font-size:24px; font-weight:600; font-family:Georgia,serif; margin-top:4px;}
  .kpi .sub{font-size:12px; color:var(--ink-soft); margin-top:4px;}
  .two-col{grid-template-columns:1fr;}
  @media(min-width:760px){ .two-col{grid-template-columns:1fr 1fr;} }
  .card h3{font-size:14px; font-weight:600; margin-bottom:12px;}
  .chart-wrap{position:relative; height:230px;}
  .chip{display:inline-block; padding:3px 10px; border-radius:99px; font-size:12px; font-weight:500; background:var(--chip); color:var(--ink-soft); white-space:nowrap;}
  .chip.wood{background:var(--wood); color:#fff;}
  .chip.green{background:var(--green); color:#fff;}
  .chip.red{background:var(--red); color:#fff;}
  .rail{display:flex; gap:3px; width:100%;}
  .rail div{flex:1; height:10px; border-radius:3px; background:var(--line);}
  .rail.compact div{height:6px;}
  .rail div.done{background:var(--wood);}
  .rail div.final{background:var(--green);}
  .rail.clickable div{cursor:pointer;}
  .paybar{height:6px; border-radius:99px; background:var(--line); overflow:hidden;}
  .paybar div{height:100%; background:var(--brass);}
  .paybar div.full{background:var(--green);}
  .muted{color:var(--ink-soft);}
  .order-row{cursor:pointer; transition:box-shadow .15s;}
  .order-row:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);}
  .order-row .top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; flex-wrap:wrap;}
  .order-row .bottom{display:grid; gap:14px; margin-top:12px; align-items:center; grid-template-columns:1fr;}
  @media(min-width:760px){ .order-row .bottom{grid-template-columns:1fr 1fr 1fr;} }
  .filters{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
  input,select,textarea{padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); font-size:14px; font-family:inherit; outline:none; width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--brass);}
  .field{display:block;}
  .field .flabel{font-size:12px; font-weight:500; color:var(--ink-soft); margin-bottom:4px;}
  .form-grid{display:grid; gap:14px; grid-template-columns:1fr;}
  @media(min-width:700px){ .form-grid{grid-template-columns:1fr 1fr;} .span2{grid-column:span 2;} }
  .pay-grid{display:grid; gap:8px; grid-template-columns:1fr; align-items:end; margin-top:16px;}
  @media(min-width:820px){ .pay-grid{grid-template-columns:1fr 1fr 1fr 1.4fr auto;} }
  .stage-list{display:grid; gap:8px; grid-template-columns:1fr; margin-top:12px;}
  @media(min-width:700px){ .stage-list{grid-template-columns:1fr 1fr;} }
  .stage-row{display:flex; justify-content:space-between; align-items:center; gap:8px; border:1px solid var(--line); border-radius:8px; padding:6px 8px 6px 0;}
  .stage-row.done{background:var(--chip);}
  .stage-row.current{background:var(--ink); border-color:var(--ink);}
  .stage-row.current .stage-name{color:#fff;}
  .stage-name{flex:1; text-align:left; font-size:12px; padding:4px 10px; background:none; border:none; color:var(--ink-soft); cursor:pointer; font-family:inherit;}
  .stage-date{width:135px; padding:4px 6px; font-size:12px; border-radius:6px;}
  .stage-row .nodate{font-size:12px; color:var(--ink-soft); padding-right:8px;}
  .pay-item{display:flex; justify-content:space-between; align-items:center; gap:8px; background:var(--chip); border-radius:8px; padding:8px 12px; font-size:14px; margin-top:8px;}
  .link-red{background:none; border:none; color:var(--red); font-size:12px; cursor:pointer; font-family:inherit;}
  .empty{text-align:center; padding:44px 20px;}
  .attn-row{display:flex; justify-content:space-between; align-items:center; gap:8px; font-size:14px; padding:6px 0; cursor:pointer;}
  .attn-row:hover{opacity:.7;}
  .err{color:var(--red); font-size:13px; margin-top:10px;}
  .spacer{height:14px;}
  footer{text-align:center; font-size:11px; color:var(--ink-soft); padding:16px;}
  .auth-wrap{max-width:400px; margin:8vh auto 0;}
  .setup-wrap{max-width:640px; margin:5vh auto 0;}
  .setup-wrap ol{margin:12px 0 12px 20px; font-size:14px; line-height:1.7;}
  .setup-wrap code{background:var(--chip); padding:1px 6px; border-radius:5px; font-size:13px;}
  .sync-dot{width:8px;height:8px;border-radius:99px;background:var(--green);display:inline-block;margin-right:5px;}
</style>
</head>
<body>

<header id="topbar" style="display:none">
  <div>
    <h1>The Order Book</h1>
    <div class="sub"><span class="sync-dot"></span>Shared online · <span id="user-email"></span></div>
  </div>
  <nav>
    <button class="btn" id="nav-dashboard" onclick="go('dashboard')">Dashboard</button>
    <button class="btn" id="nav-orders" onclick="go('orders')">Orders</button>
    <button class="btn solid" onclick="openForm(null)">+ New order</button>
    <button class="btn small" onclick="exportBackup()" title="Download all data as a backup file">Backup</button>
    <button class="btn small" onclick="document.getElementById('import-file').click()" title="Restore from a backup file">Restore</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(this)">
    <button class="btn small" onclick="signOut()">Sign out</button>
  </nav>
</header>

<main id="app"></main>
<footer>Data is stored securely online and synced live between all signed-in users.</footer>

<script>
/* =========================================================================
   SETUP — PASTE YOUR FIREBASE CONFIG BELOW (one-time, ~10 minutes)
   Full instructions appear on screen when you open this page unconfigured.
   ========================================================================= */
const FIREBASE_CONFIG = {
  apiKey:     "AIzaSyDZJUXzteMrOiHsg5f7A__cYLidYPbMrks",
  authDomain: "order-book-e5f1f.firebaseapp.com",
  projectId:  "order-book-e5f1f",
};
/* ========================================================================= */

// ---------- Constants ----------
const STAGES = ["Order received","Design approved","Materials sourced","In production",
  "Finishing & upholstery","Quality check","Ready for delivery","Delivered"];
const CSS = getComputedStyle(document.documentElement);
const COL = n => CSS.getPropertyValue(n).trim();

// ---------- State ----------
let orders = [];
let view = "dashboard";
let selectedId = null, editingId = null;
let search = "", stageFilter = "all", payFilter = "all";
let charts = [];
let db = null, docRef = null, unsubscribe = null;

// ---------- Helpers ----------
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const todayISO = () => new Date().toISOString().slice(0,10);
const money = n => "EGP " + (Number(n)||0).toLocaleString("en-US",{maximumFractionDigits:0});
const fdate = d => { if(!d) return "—"; const t=new Date(d); return isNaN(t)?"—":t.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); };
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const paidOf = o => (o.payments||[]).reduce((s,p)=>s+(Number(p.amount)||0),0);
const balOf = o => (Number(o.totalPrice)||0) - paidOf(o);
const overdue = o => o.dueDate && o.stageIndex < STAGES.length-1 && new Date(o.dueDate) < new Date(todayISO());
const byId = id => orders.find(o=>o.id===id);

async function persist(){
  if(!docRef) return;
  try{ await docRef.set({ orders, updatedAt: new Date().toISOString() }); }
  catch(e){ console.error("Save failed", e); alert("Could not save to the online database. Check your internet connection."); }
}

// ---------- Backup / restore ----------
function exportBackup(){
  const blob = new Blob([JSON.stringify({orders}, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "order-book-backup-" + todayISO() + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
async function importBackup(input){
  const file = input.files[0]; input.value = "";
  if(!file) return;
  try{
    const data = JSON.parse(await file.text());
    if(!data || !Array.isArray(data.orders)) throw new Error("bad format");
    if(!confirm(`Restore ${data.orders.length} orders from this backup? This replaces the current shared data for everyone.`)) return;
    orders = data.orders;
    await persist(); render();
  }catch(e){ alert("This file is not a valid Order Book backup."); }
}

// ---------- Navigation ----------
function go(v){ view=v; render(); }
function openOrder(id){ selectedId=id; view="detail"; render(); }
function openForm(id){ editingId=id; view="form"; render(); }

// ---------- Shared renderers ----------
function railHTML(stageIndex, compact, clickable, id, stageDates){
  const cells = STAGES.map((s,i)=>{
    const cls = i<=stageIndex ? (i===STAGES.length-1?"final":"done") : "";
    const click = clickable ? `onclick="setStage('${id}',${i})"` : "";
    const d = stageDates && stageDates[i] ? " — " + fdate(stageDates[i]) : "";
    return `<div class="${cls}" title="${esc(s)}${d}" ${click}></div>`;
  }).join("");
  return `<div class="rail ${compact?'compact':''} ${clickable?'clickable':''}">${cells}</div>`;
}
function paybarHTML(o){
  const total=Number(o.totalPrice)||0;
  const pct= total>0? Math.min(100,Math.round(paidOf(o)/total*100)):0;
  return `<div><div class="paybar"><div class="${pct>=100?'full':''}" style="width:${pct}%"></div></div>
    <div style="font-size:12px;margin-top:4px" class="muted">${pct}% paid</div></div>`;
}
function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }

// ---------- Views ----------
function render(){
  destroyCharts();
  document.getElementById("nav-dashboard").classList.toggle("active", view==="dashboard");
  document.getElementById("nav-orders").classList.toggle("active", view==="orders"||view==="detail");
  const app=document.getElementById("app");
  if(view==="dashboard") renderDashboard(app);
  else if(view==="orders") renderOrders(app);
  else if(view==="detail") renderDetail(app);
  else if(view==="form") renderForm(app);
}

function renderDashboard(app){
  if(orders.length===0){
    app.innerHTML = `<div class="card empty">
      <div class="serif" style="font-size:18px;font-weight:600;margin-bottom:6px">The order book is empty</div>
      <p class="muted" style="font-size:14px;margin-bottom:16px">Add your first order to get started. Anything you add is instantly visible to the other signed-in user.</p>
      <button class="btn solid" onclick="openForm(null)">Add first order</button>
    </div>`;
    return;
  }
  const active = orders.filter(o=>o.stageIndex<STAGES.length-1).length;
  const outstanding = orders.reduce((s,o)=>s+Math.max(0,balOf(o)),0);
  const collected = orders.reduce((s,o)=>s+paidOf(o),0);
  const late = orders.filter(overdue);
  const ready = orders.filter(o=>o.stageIndex===STAGES.length-2);

  const attn = (late.length||ready.length) ? `<div class="card">
      <h3>Needs attention</h3>
      ${late.map(o=>`<div class="attn-row" onclick="openOrder('${o.id}')">
        <span>${esc(o.orderNo)} · ${esc(o.customer)}</span>
        <span class="chip red">Overdue — due ${fdate(o.dueDate)}</span></div>`).join("")}
      ${ready.map(o=>`<div class="attn-row" onclick="openOrder('${o.id}')">
        <span>${esc(o.orderNo)} · ${esc(o.customer)}</span>
        <span class="chip green">Ready for delivery${balOf(o)>0?` · ${money(balOf(o))} due`:""}</span></div>`).join("")}
    </div>` : "";

  app.innerHTML = `
    <div class="grid kpis">
      <div class="card kpi"><div class="label">Active orders</div><div class="value">${active}</div><div class="sub">${orders.length} total</div></div>
      <div class="card kpi"><div class="label">Outstanding</div><div class="value" style="color:var(--red)">${money(outstanding)}</div><div class="sub">Balance to collect</div></div>
      <div class="card kpi"><div class="label">Collected</div><div class="value" style="color:var(--green)">${money(collected)}</div><div class="sub">All payments</div></div>
      <div class="card kpi"><div class="label">Overdue</div><div class="value" ${late.length?'style="color:var(--red)"':''}>${late.length}</div><div class="sub">Past due, not delivered</div></div>
    </div>
    <div class="spacer"></div>
    <div class="grid two-col">
      <div class="card"><h3>Orders by production stage</h3><div class="chart-wrap"><canvas id="chart-stage"></canvas></div></div>
      <div class="card"><h3>Collected vs outstanding</h3><div class="chart-wrap"><canvas id="chart-pie"></canvas></div></div>
    </div>
    <div class="spacer"></div>
    <div class="card"><h3>Payments collected by month</h3><div class="chart-wrap" style="height:200px"><canvas id="chart-cash"></canvas></div></div>
    <div class="spacer"></div>
    ${attn}`;

  const stageCounts = STAGES.map((s,i)=>orders.filter(o=>o.stageIndex===i).length);
  charts.push(new Chart(document.getElementById("chart-stage"),{
    type:"bar",
    data:{labels:STAGES.map(s=>s.length>14?s.slice(0,13)+"…":s),
      datasets:[{data:stageCounts, backgroundColor:COL("--wood"), borderRadius:4}]},
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{title:i=>STAGES[i[0].dataIndex]}}},
      scales:{x:{ticks:{font:{size:10}, maxRotation:45, minRotation:30}, grid:{display:false}},
              y:{beginAtZero:true, ticks:{precision:0}}}}
  }));
  charts.push(new Chart(document.getElementById("chart-pie"),{
    type:"doughnut",
    data:{labels:["Collected","Outstanding"],
      datasets:[{data:[collected,outstanding], backgroundColor:[COL("--green"),COL("--red")], borderWidth:0}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:"62%",
      plugins:{legend:{position:"bottom"},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${money(c.raw)}`}}}}
  }));
  const map={};
  orders.forEach(o=>(o.payments||[]).forEach(p=>{
    const k=(p.date||"").slice(0,7); if(!k) return;
    map[k]=(map[k]||0)+(Number(p.amount)||0);
  }));
  const keys=Object.keys(map).sort().slice(-8);
  const labels=keys.map(k=>{const[y,m]=k.split("-");return new Date(+y,+m-1,1).toLocaleDateString("en-GB",{month:"short",year:"2-digit"});});
  charts.push(new Chart(document.getElementById("chart-cash"),{
    type:"line",
    data:{labels, datasets:[{data:keys.map(k=>map[k]), borderColor:COL("--brass"),
      backgroundColor:"rgba(169,126,47,.18)", fill:true, tension:.35, pointRadius:3}]},
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${money(c.raw)}`}}},
      scales:{y:{beginAtZero:true, ticks:{callback:v=>v>=1000?(v/1000)+"k":v}}}}
  }));
}

function filterOrders(){
  const q=search.trim().toLowerCase();
  return orders.filter(o=>{
    const mq=!q||(o.customer||"").toLowerCase().includes(q)||(o.orderNo||"").toLowerCase().includes(q)||(o.item||"").toLowerCase().includes(q);
    const ms=stageFilter==="all"||o.stageIndex===Number(stageFilter);
    const b=balOf(o);
    const mp=payFilter==="all"||(payFilter==="paid"&&b<=0)||(payFilter==="due"&&b>0)||(payFilter==="overdue"&&overdue(o));
    return mq&&ms&&mp;
  });
}

function renderOrders(app){
  const list=filterOrders();
  app.innerHTML = `
    <div class="filters">
      <input style="max-width:260px" placeholder="Search customer, order no, item…" value="${esc(search)}"
        oninput="search=this.value; refreshList()">
      <select style="max-width:200px" onchange="stageFilter=this.value; refreshList()">
        <option value="all">All stages</option>
        ${STAGES.map((s,i)=>`<option value="${i}" ${String(i)===stageFilter?'selected':''}>${esc(s)}</option>`).join("")}
      </select>
      <select style="max-width:170px" onchange="payFilter=this.value; refreshList()">
        <option value="all" ${payFilter==='all'?'selected':''}>All payments</option>
        <option value="due" ${payFilter==='due'?'selected':''}>Balance due</option>
        <option value="paid" ${payFilter==='paid'?'selected':''}>Fully paid</option>
        <option value="overdue" ${payFilter==='overdue'?'selected':''}>Overdue</option>
      </select>
      <div class="muted" style="font-size:14px;margin-left:auto" id="order-count"></div>
    </div>
    <div id="order-list"></div>`;
  refreshList();
}
function listHTML(list){
  if(list.length===0) return `<div class="card empty muted" style="font-size:14px">No orders match. Adjust the filters or add a new order.</div>`;
  return list.map(o=>{
    const b=balOf(o);
    return `<div class="card order-row" style="margin-bottom:10px" onclick="openOrder('${o.id}')">
      <div class="top">
        <div>
          <div style="font-weight:600">${esc(o.customer)} <span class="muted" style="font-weight:400;font-size:13px">· ${esc(o.orderNo)}</span></div>
          <div class="muted" style="font-size:14px">${esc(o.item)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${overdue(o)?'<span class="chip red">Overdue</span>':""}
          <span class="chip ${o.stageIndex===STAGES.length-1?'green':'wood'}">${esc(STAGES[o.stageIndex])}</span>
        </div>
      </div>
      <div class="bottom">
        ${railHTML(o.stageIndex,true,false,null,o.stageDates)}
        ${paybarHTML(o)}
        <div style="font-size:14px">
          <span class="muted">Due ${fdate(o.dueDate)} · </span>
          <span style="font-weight:600;color:${b>0?'var(--red)':'var(--green)'}">${b>0?money(b)+" due":"Fully paid"}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}
function refreshList(){
  const list=filterOrders();
  const el=document.getElementById("order-list");
  const cnt=document.getElementById("order-count");
  if(el) el.innerHTML=listHTML(list);
  if(cnt) cnt.textContent = `${list.length} order${list.length!==1?"s":""}`;
}

function renderDetail(app){
  const o=byId(selectedId);
  if(!o){ go("orders"); return; }
  const b=balOf(o), paid=paidOf(o);
  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <button class="btn small" onclick="go('orders')">← All orders</button>
      <div style="display:flex;gap:8px">
        <button class="btn small" onclick="openForm('${o.id}')">Edit order</button>
        <button class="btn small danger" onclick="deleteOrder('${o.id}')">Delete</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div class="serif" style="font-size:20px;font-weight:600">${esc(o.customer)}</div>
          <div class="muted" style="font-size:14px">${esc(o.orderNo)} · ${esc(o.phone||"no phone")}</div>
          <div style="font-size:14px;margin-top:8px">${esc(o.item)}</div>
        </div>
        <div style="text-align:right">
          <div class="muted" style="font-size:12px">Order total</div>
          <div class="serif" style="font-size:24px;font-weight:600">${money(o.totalPrice)}</div>
          <div style="font-size:14px;margin-top:4px;color:${b>0?'var(--red)':'var(--green)'}">${b>0?money(b)+" remaining":"Fully paid"}</div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <span class="chip">Ordered ${fdate(o.createdDate)}</span>
        <span class="chip ${overdue(o)?'red':''}">Due ${fdate(o.dueDate)}</span>
      </div>
      ${o.notes?`<div style="margin-top:12px;font-size:14px;background:var(--chip);border-radius:8px;padding:10px 12px">${esc(o.notes)}</div>`:""}
    </div>
    <div class="spacer"></div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0">Production timeline</h3>
        <span class="chip ${o.stageIndex===STAGES.length-1?'green':'wood'}">${esc(STAGES[o.stageIndex])}</span>
      </div>
      ${railHTML(o.stageIndex,false,true,o.id,o.stageDates)}
      <div class="stage-list">
        ${STAGES.map((s,i)=>{
          const done = i<=o.stageIndex;
          const d = (o.stageDates||{})[i]||"";
          return `<div class="stage-row ${i===o.stageIndex?'current':done?'done':''}">
            <button class="stage-name" onclick="setStage('${o.id}',${i})">${i<o.stageIndex?"✓ ":""}${esc(s)}</button>
            ${done
              ? `<input type="date" class="stage-date" value="${d}" title="Actual date this stage was reached"
                   onclick="event.stopPropagation()" onchange="setStageDate('${o.id}',${i},this.value)">`
              : `<span class="nodate">not reached</span>`}
          </div>`;
        }).join("")}
      </div>
      <div class="muted" style="font-size:12px;margin-top:10px">Dates are filled automatically when you advance a stage — click any date to correct it.</div>
      ${o.stageIndex<STAGES.length-1?`<div style="margin-top:12px">
        <button class="btn solid small" onclick="setStage('${o.id}',${o.stageIndex+1})">Advance to “${esc(STAGES[o.stageIndex+1])}”</button></div>`:""}
    </div>
    <div class="spacer"></div>

    <div class="card">
      <h3 style="margin-bottom:4px">Payments</h3>
      <div class="muted" style="font-size:12px;margin-bottom:12px">${money(paid)} collected of ${money(o.totalPrice)}</div>
      ${paybarHTML(o)}
      <div style="margin-top:8px">
        ${(o.payments||[]).length===0?'<div class="muted" style="font-size:14px;margin-top:8px">No payments recorded yet.</div>':""}
        ${(o.payments||[]).map(p=>`<div class="pay-item">
          <div><b>${money(p.amount)}</b> <span class="muted">· ${fdate(p.date)} · ${esc(p.method)}${p.note?" · "+esc(p.note):""}</span></div>
          <button class="link-red" onclick="removePayment('${o.id}','${p.id}')">Remove</button>
        </div>`).join("")}
      </div>
      <div class="pay-grid">
        <label class="field"><div class="flabel">Amount (EGP)</div><input type="number" min="0" id="pay-amount" placeholder="0"></label>
        <label class="field"><div class="flabel">Date</div><input type="date" id="pay-date" value="${todayISO()}"></label>
        <label class="field"><div class="flabel">Method</div><select id="pay-method">
          <option>Cash</option><option>Bank transfer</option><option>Card</option><option>Cheque</option><option>Instapay / wallet</option>
        </select></label>
        <label class="field"><div class="flabel">Note (optional)</div><input id="pay-note" placeholder="e.g. Deposit 50%"></label>
        <button class="btn solid" onclick="addPayment('${o.id}')">Record payment</button>
      </div>
    </div>`;
}

function renderForm(app){
  const o = editingId ? byId(editingId) : null;
  const orderNo = o? o.orderNo : "ORD-"+String(Math.floor(1000+Math.random()*9000));
  app.innerHTML = `
    <div class="card" style="max-width:680px;margin:0 auto">
      <div class="serif" style="font-size:18px;font-weight:600;margin-bottom:16px">${o?"Edit order":"New order"}</div>
      <div class="form-grid">
        <label class="field"><div class="flabel">Order number</div><input id="f-no" value="${esc(orderNo)}"></label>
        <label class="field"><div class="flabel">Customer name</div><input id="f-customer" value="${esc(o?.customer||"")}" placeholder="e.g. Nour El Sayed"></label>
        <label class="field"><div class="flabel">Phone</div><input id="f-phone" value="${esc(o?.phone||"")}" placeholder="010 …"></label>
        <label class="field"><div class="flabel">Order total (EGP)</div><input id="f-total" type="number" min="0" value="${o?.totalPrice??""}" placeholder="0"></label>
        <label class="field span2"><div class="flabel">Item / description</div><input id="f-item" value="${esc(o?.item||"")}" placeholder="e.g. Dining table 240cm + 8 chairs, oak"></label>
        <label class="field"><div class="flabel">Order date</div><input id="f-created" type="date" value="${o?.createdDate||todayISO()}"></label>
        <label class="field"><div class="flabel">Promised delivery date</div><input id="f-due" type="date" value="${o?.dueDate||""}"></label>
        <label class="field span2"><div class="flabel">Notes</div><textarea id="f-notes" style="min-height:70px" placeholder="Fabric codes, delivery address, special requests…">${esc(o?.notes||"")}</textarea></label>
      </div>
      <div class="err" id="f-err"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button class="btn" onclick="go('${o?"detail":"orders"}')">Cancel</button>
        <button class="btn solid" onclick="saveForm()">${o?"Save changes":"Create order"}</button>
      </div>
    </div>`;
}

// ---------- Actions ----------
async function saveForm(){
  const v = id => document.getElementById(id).value;
  const f = { orderNo:v("f-no").trim(), customer:v("f-customer").trim(), phone:v("f-phone").trim(),
    item:v("f-item").trim(), totalPrice:Number(v("f-total")), createdDate:v("f-created"),
    dueDate:v("f-due"), notes:v("f-notes").trim() };
  const err = document.getElementById("f-err");
  if(!f.customer){ err.textContent="Customer name is required."; return; }
  if(!f.item){ err.textContent="Describe the item or order."; return; }
  if(!f.totalPrice || f.totalPrice<=0){ err.textContent="Enter the order total."; return; }
  if(editingId){
    orders = orders.map(o=>o.id===editingId?{...o,...f}:o);
    selectedId = editingId;
  }else{
    const o = {id:uid(), stageIndex:0, payments:[], stageDates:{0:todayISO()}, ...f};
    orders = [o, ...orders];
    selectedId = o.id;
  }
  editingId=null;
  await persist();
  go("detail");
}

async function setStage(id, idx){
  orders = orders.map(o=>{
    if(o.id!==id) return o;
    const sd = {...(o.stageDates||{})};
    for(let i=0;i<=idx;i++){ if(!sd[i]) sd[i]=todayISO(); }
    for(let i=idx+1;i<STAGES.length;i++){ delete sd[i]; }
    return {...o, stageIndex:idx, stageDates:sd};
  });
  await persist(); render();
}

async function setStageDate(id, i, value){
  orders = orders.map(o=>o.id===id?{...o, stageDates:{...(o.stageDates||{}), [i]:value}}:o);
  await persist();
}

async function addPayment(id){
  const amt = Number(document.getElementById("pay-amount").value);
  if(!amt || amt<=0) return;
  const pay = { id:uid(), amount:amt,
    date:document.getElementById("pay-date").value || todayISO(),
    method:document.getElementById("pay-method").value,
    note:document.getElementById("pay-note").value.trim() };
  orders = orders.map(o=>o.id===id?{...o,payments:[...(o.payments||[]),pay]}:o);
  await persist(); render();
}

async function removePayment(id, pid){
  orders = orders.map(o=>o.id===id?{...o,payments:(o.payments||[]).filter(p=>p.id!==pid)}:o);
  await persist(); render();
}

async function deleteOrder(id){
  if(!confirm("Delete this order and its payment history? This removes it for all users.")) return;
  orders = orders.filter(o=>o.id!==id);
  await persist(); go("orders");
}

// ---------- Auth & setup screens ----------
function showSetupScreen(){
  document.getElementById("app").innerHTML = `
    <div class="card setup-wrap">
      <div class="serif" style="font-size:20px;font-weight:600;margin-bottom:6px">One-time setup: connect your database</div>
      <p class="muted" style="font-size:14px">This page needs a free Google Firebase database so both users share the same live data. Do this once (~10 minutes):</p>
      <ol>
        <li>Go to <b>console.firebase.google.com</b> and sign in with a Google account.</li>
        <li>Click <b>Add project</b>, name it (e.g. <code>order-book</code>), disable Analytics, create it.</li>
        <li>In the left menu open <b>Build → Firestore Database</b> → <b>Create database</b> → choose <b>Production mode</b> and a nearby region (e.g. <code>eur3</code>).</li>
        <li>Open the <b>Rules</b> tab and replace the rules with:<br>
          <code>rules_version = '2';<br>
          service cloud.firestore {<br>
          &nbsp;&nbsp;match /databases/{database}/documents {<br>
          &nbsp;&nbsp;&nbsp;&nbsp;match /{document=**} {<br>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read, write: if request.auth != null;<br>
          &nbsp;&nbsp;&nbsp;&nbsp;}<br>
          &nbsp;&nbsp;}<br>
          }</code><br>
          then click <b>Publish</b>. (This means only signed-in users can touch the data.)</li>
        <li>Open <b>Build → Authentication</b> → <b>Get started</b> → enable <b>Email/Password</b>. Then in the <b>Users</b> tab click <b>Add user</b> twice — create an email + password for you and for your partner.</li>
        <li>Click the <b>gear icon → Project settings</b>, scroll to <b>Your apps</b>, click the <b>&lt;/&gt;</b> (web) icon, register the app (no hosting needed). Firebase shows a config block.</li>
        <li>Open this HTML file in a text editor (Notepad), find <code>FIREBASE_CONFIG</code> near the top, and paste your <code>apiKey</code>, <code>authDomain</code>, and <code>projectId</code> values. Save.</li>
      </ol>
      <p class="muted" style="font-size:14px">Reload the page — you'll see the login screen. Send Claude a message if you get stuck on any step.</p>
    </div>`;
}

function showLoginScreen(msg){
  document.getElementById("topbar").style.display = "none";
  document.getElementById("app").innerHTML = `
    <div class="card auth-wrap">
      <div class="serif" style="font-size:20px;font-weight:600;margin-bottom:4px">The Order Book</div>
      <p class="muted" style="font-size:13px;margin-bottom:16px">Sign in to view and manage orders.</p>
      <label class="field" style="margin-bottom:12px"><div class="flabel">Email</div><input id="login-email" type="email" autocomplete="username"></label>
      <label class="field"><div class="flabel">Password</div><input id="login-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"></label>
      <div class="err" id="login-err">${msg||""}</div>
      <div style="margin-top:16px"><button class="btn solid" style="width:100%" onclick="signIn()">Sign in</button></div>
    </div>`;
}

async function signIn(){
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;
  const err = document.getElementById("login-err");
  if(!email || !pass){ err.textContent = "Enter your email and password."; return; }
  err.textContent = "";
  try{ await firebase.auth().signInWithEmailAndPassword(email, pass); }
  catch(e){ err.textContent = "Sign-in failed. Check the email and password."; }
}
function signOut(){ firebase.auth().signOut(); }

function startApp(user){
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("user-email").textContent = user.email || "";
  db = firebase.firestore();
  docRef = db.collection("furnitrack").doc("data");
  if(unsubscribe) unsubscribe();
  unsubscribe = docRef.onSnapshot(snap=>{
    const data = snap.exists ? snap.data() : {orders:[]};
    const incoming = Array.isArray(data.orders) ? data.orders : [];
    if(JSON.stringify(incoming) !== JSON.stringify(orders)){
      orders = incoming;
      if(view !== "form") render();   // don't wipe a form someone is typing in
      else render();                   // form re-reads from state anyway on save
    } else if (!document.getElementById("app").innerHTML) {
      render();
    }
  }, e=>{
    console.error(e);
    document.getElementById("app").innerHTML =
      `<div class="card empty"><div class="err">Could not reach the database. Check your internet connection or Firestore rules.</div></div>`;
  });
  render();
}

// ---------- Init ----------
(function init(){
  const unconfigured = Object.values(FIREBASE_CONFIG).some(v=>String(v).includes("PASTE"));
  if(unconfigured || typeof firebase === "undefined"){ showSetupScreen(); return; }
  firebase.initializeApp(FIREBASE_CONFIG);
  firebase.auth().onAuthStateChanged(user=>{
    if(user){ startApp(user); }
    else { if(unsubscribe){unsubscribe(); unsubscribe=null;} orders=[]; showLoginScreen(); }
  });
})();
</script>
</body>
</html>
